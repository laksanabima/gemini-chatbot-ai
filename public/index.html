<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Doctor Assistant - Health Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div id="header-content">
                <i class="fas fa-stethoscope"></i>
                <h1>AI Doctor Assistant</h1>
                <!-- <p>Your AI-powered health assistant for preliminary diagnosis and medical guidance</p>  -->
                <!-- Guanakan bahasa indonesia   -->
                <p>Asisten kesehatan bertenaga AI untuk diagnosis awal dan panduan medis</p>
            </div>
        </header>
        <div id="chat-container">
            <div id="chat-box"></div>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Tulis pesan atau keluhan Anda di sini..." autocomplete="off">
                <button type="submit"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
        <footer id="footer">
            <!-- <p><i class="fas fa-info-circle"></i> This AI assistant provides general health information and is not a substitute for professional medical advice. Always consult a healthcare provider for medical concerns.</p> -->
            <p><i class="fas fa-info-circle"></i> Asisten AI ini memberikan informasi kesehatan umum dan bukan pengganti nasihat medis profesional. Selalu konsultasikan dengan penyedia layanan kesehatan untuk masalah medis.</p>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
